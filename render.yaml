services:
  # ── Backend (FastAPI) ──────────────────────────────
  - type: web
    name: autopro-backend
    runtime: docker
    dockerfilePath: ./back/Dockerfile
    dockerContext: ./back
    envVars:
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: API_V1_STR
        value: "/api/v1"
      - key: HOST
        value: "0.0.0.0"
      - key: BACKEND_PORT
        value: "8000"
      - key: SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      - key: CORS_ORIGINS
        value: "https://autopro.kz,https://www.autopro.kz"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TELEGRAM_NOTIFICATION_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false

  # ── Frontend (Next.js) ─────────────────────────────
  - type: web
    name: autopro-frontend
    runtime: docker
    dockerfilePath: ./front/Dockerfile
    dockerContext: ./front
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://api.autopro.kz/api/v1"

  # ── WhatsApp Gateway (Node.js) ─────────────────────────
  - type: web
    name: autopro-whatsapp-gateway
    runtime: docker
    dockerfilePath: ./whatsapp-gateway/Dockerfile
    dockerContext: ./whatsapp-gateway
    envVars:
      - key: PORT
        value: "3001"
      - key: WHATSAPP_GATEWAY_TOKEN
        sync: false
      - key: ADMIN_LOGIN
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
