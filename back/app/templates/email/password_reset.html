<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .content {
            padding: 30px;
        }

        .password-box {
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
            background: #eff6ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2563eb;
            color: white !important;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>AutoRentGo</h1>
        </div>
        <div class="content">
            <h2>Новый пароль</h2>
            <p>Здравствуйте!</p>
            <p>Администратор сбросил ваш пароль. Ваш новый временный пароль для входа:</p>
            <div class="password-box">{{ new_password }}</div>
            <p>Рекомендуем сменить его сразу после входа в личном кабинете.</p>
            <p style="text-align: center;">
                <a href="{{ login_url }}" class="btn">Войти в личный кабинет</a>
            </p>
        </div>
        <div class="footer">
            &copy; 2026 AutoRentGo. Все права защищены.
        </div>
    </div>
</body>

</html>
