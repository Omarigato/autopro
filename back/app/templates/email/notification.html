<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .content {
            padding: 30px;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>AutoPro</h1>
        </div>
        <div class="content">
            <h2>{{ title }}</h2>
            <p>{{ message | replace('\n', '<br>') | safe }}</p>
            {% if action_url %}
            <div style="text-align: center;">
                <a href="{{ action_url }}" class="button">{{ action_text or 'Открыть' }}</a>
            </div>
            {% endif %}
            <p style="margin-top: 30px;">С уважением,<br>Команда AutoPro</p>
        </div>
        <div class="footer">
            &copy; 2026 AutoPro. Все права защищены.
        </div>
    </div>
</body>

</html>
